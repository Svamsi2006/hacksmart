<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Battery Smart Logo - Green hourglass/battery shape -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C853;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Top cap -->
  <rect x="35" y="5" width="30" height="8" rx="3" fill="url(#logoGradient)"/>
  
  <!-- Main body - hourglass X shape -->
  <path d="M25 18 L75 18 L75 25 L55 50 L75 75 L75 82 L25 82 L25 75 L45 50 L25 25 Z" 
        fill="url(#logoGradient)" 
        stroke="url(#logoGradient)" 
        stroke-width="2"
        stroke-linejoin="round"/>
</svg>
